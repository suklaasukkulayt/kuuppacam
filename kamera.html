//you might need to change the ip address in the src attribute of the img and audio tags to match your camera's ip address.
<!DOCTYPE html>
<html>
    <style>
        img  {
            max-width: 100%;
            max-height: 90%;
        }
    </style>
    <body>
        <h1>Surveillance Camera</h1>
        <img 
        src="http://192.168.100.20:8080/video"/>
        <audio controls>
            <source src="http://192.168.100.20:8080/audio.wav" type="audio/wav">
        </audio>
        <p>KuuppaCam</p>
    </body>
</html>
